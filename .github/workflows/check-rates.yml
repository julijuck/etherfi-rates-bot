name: Check ether.fi Cash rates

# No schedule trigger: GitHub Actions runners use US datacenter IPs, and
# ether.fi's /cash/earn page substitutes a different, lower-yield vault
# ("Reserve") for the user's real "USD" vault when viewed from a
# US-restricted region. The real check runs locally instead (see README).
# This workflow stays available for manual debugging only.
on:
  workflow_dispatch:
    inputs:
      debug_scrape:
        description: 'Loguear el texto completo de cada página (para diagnosticar)'
        type: boolean
        default: false
      debug_url:
        description: 'Si se completa, solo hace debug de esta URL (no corre el check normal)'
        type: string
        default: ''
      spread_threshold:
        description: 'Override de SPREAD_THRESHOLD (ej. 10 para forzar un email de prueba)'
        type: string
        default: '0.25'

jobs:
  check-rates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Debug URL
        if: ${{ inputs.debug_url != '' }}
        env:
          DEBUG_URL: ${{ inputs.debug_url }}
        run: node src/debugUrl.js

      - name: Check rates
        if: ${{ inputs.debug_url == '' }}
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SPREAD_THRESHOLD: ${{ inputs.spread_threshold }}
          DEBUG_SCRAPE: ${{ inputs.debug_scrape && '1' || '' }}
        run: npm run check
