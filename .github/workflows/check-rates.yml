name: Check ether.fi Cash rates

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      debug_scrape:
        description: 'Loguear el texto completo de cada página (para diagnosticar)'
        type: boolean
        default: false

jobs:
  check-rates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Check rates
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SPREAD_THRESHOLD: '0.25'
          DEBUG_SCRAPE: ${{ inputs.debug_scrape && '1' || '' }}
        run: npm run check
